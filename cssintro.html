<!--


SELECTOR {
    PROPIEDAD: VALOR
}

Selector => Es el puente que comunica HTML con CSS. Con los selectores
vamos a poder indicar que elementos HTML queremos estilizar . 

Llaves {} => Va todo el codigo CSS.

Propiedad => Es el nombre del estilo CSS.

Valor => El valor que tomara la propiedad.

Ejemplo:

h1{
    color: pink;
}

---------------------------------------------
TIPOS DE SELECTORES - BASICOS & COMBINADORES
----------------------------------------------

--------------------
SELECTORES BASICOS
--------------------

1. DE TIPO => div{...}
2. DE CLASE => .
3. DE ID => #id-elemento{...}
4. DE ATRIBUTO => a[href=" "]{...}
5. UNIVERSAL => *{...}
-->

<style>

    *{
        color: white;
        text-align: center;
    }
    

    body{

    }

    /* SELECTOR DE ATRIBUTO */


    a[href="https://es.erome.com/"]{

    /* SELECTOR DE CLASE */


</style>
